trainer:
  init:
    model_dir: ./model_dir_gnn/ogbn_products_graphsage
    seed: 42
    model:
      name: graphsage

      # Dataset-specific dimensions for ogbn-products
      n_feat: 100
      n_class: 47

      to_float16: True
      compute_eval_metrics: False
      disable_log_softmax: False
      core_architecture: GraphSAGE
      graphsage_hidden_dim: 1024
      graphsage_num_layers: 3
      graphsage_dropout: 0.5
      graphsage_aggregator: mean

    optimizer:
      AdamW:
        params: []
        learning_rate: 0.003
        weight_decay: 0.0005

    precision:
      enabled: True
      fp16_type: "float16"
      loss_scaling_factor: "dynamic"

    loop:
      max_steps: 1000
      steps_per_epoch: 40
      eval_frequency: 40

    logging:
      log_steps: 40

  fit:
    train_dataloader:
      data_processor: GNNDataProcessor
      dataset_profiles: &ogbn_products_dataset
        ogbn_products:
          dataset_name: ogbn-products
          data_dir: "$MODELZOO_ROOT/models/gnn/data/datasets"
          sampling_mode: neighbor
          fanouts: [15, 10, 5]
          pad_node_id: 0
      dataset: ogbn_products
      batch_size: 4096
      drop_last_batch: False
      shuffle: True
      num_workers: 40
      prefetch_factor: 2
      persistent_workers: True
      pin_memory: True
      sampler_seed: 42
      caching_percent: null
      split: train

    val_dataloader: &ogbn_products_eval_loader
      data_processor: GNNDataProcessor
      dataset_profiles: *ogbn_products_dataset
      dataset: ogbn_products
      batch_size: 4096
      drop_last_batch: False
      shuffle: False
      num_workers: 40
      prefetch_factor: 2
      persistent_workers: True
      pin_memory: True
      sampler_seed: 42
      split: valid

  validate:
    val_dataloader: *ogbn_products_eval_loader

  validate_all:
    val_dataloaders:
      - *ogbn_products_eval_loader

runconfig:
  python_paths:
    - "$MODELZOO_ROOT/../.."
