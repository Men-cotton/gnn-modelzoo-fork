trainer:
  init:
    model_dir: ./model_dir_gnn/ogbn_arxiv_graphsage
    seed: 42
    model:
      name: graphsage

      # Dataset-specific dimensions for ogbn-arxiv
      n_feat: 128
      n_class: 40

      to_float16: True
      compute_eval_metrics: False
      disable_log_softmax: False
      core_architecture: GraphSAGE
      graphsage_hidden_dim: 1024
      graphsage_num_layers: 3
      graphsage_dropout: 0.5
      graphsage_aggregator: mean

    optimizer:
      AdamW:
        params: []
        learning_rate: 0.003
        weight_decay: 0.0005

    loop:
      max_steps: 500
      steps_per_epoch: 20
      eval_frequency: 20

    logging:
      log_steps: 20

  fit:
    train_dataloader:
      data_processor: GNNDataProcessor
      dataset_profiles: &ogbn_arxiv_dataset
        ogbn_arxiv:
          dataset_name: ogbn-arxiv
          data_dir: "$MODELZOO_ROOT/models/gnn/data/datasets"
          sampling_mode: neighbor
          fanouts: [15, 10, 5]
          pad_node_id: 0
      dataset: ogbn_arxiv
      batch_size: 4096
      drop_last_batch: False
      shuffle: True
      num_workers: 40
      prefetch_factor: 2
      persistent_workers: True
      pin_memory: True
      sampler_seed: 42
      caching_percent: null
      split: train

    val_dataloader: &ogbn_arxiv_eval_loader
      data_processor: GNNDataProcessor
      dataset_profiles: *ogbn_arxiv_dataset
      dataset: ogbn_arxiv
      batch_size: 4096
      drop_last_batch: False
      shuffle: False
      num_workers: 40
      prefetch_factor: 2
      persistent_workers: True
      pin_memory: True
      sampler_seed: 42
      split: valid

  validate:
    val_dataloader: *ogbn_arxiv_eval_loader

  validate_all:
    val_dataloaders:
      - *ogbn_arxiv_eval_loader

runconfig:
  python_paths:
    - "$MODELZOO_ROOT/../.."
