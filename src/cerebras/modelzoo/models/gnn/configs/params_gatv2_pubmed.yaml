trainer:
  init:
    model_dir: ./src/cerebras/modelzoo/models/gnn/docs/artifacts/runtime/model_dirs/PubMed_gatv2
    seed: 42
    model:
      name: gatv2

      # Dataset-specific dimensions
      n_feat: 500
      n_class: 3

      # GATv2 architecture parameters
      n_hid: 64
      dropout_rate: 0.5
      activation_fn_hidden: relu
      activation_fn_output: none
      use_bias: True
      core_architecture: GATv2
      gatv2_num_heads: 8

      # Trainer wrapper parameters
      compute_eval_metrics: False
      disable_log_softmax: False

    optimizer:
      AdamW:
        params: []
        learning_rate: 0.01
        weight_decay: 0.0005

    precision:
      enabled: True
      fp16_type: "float16"
      loss_scaling_factor: "dynamic"

    loop:
      max_steps: 200
      steps_per_epoch: 1
      eval_frequency: 10

    logging:
      log_steps: 1

  fit:
    train_dataloader:
      data_processor: GNNDataProcessor
      dataset_name: PubMed
      data_dir: "$MODELZOO_ROOT/../../../data/gnn/datasets"
      sampling_mode: full_graph
      batch_size: 1
      drop_last_batch: True
      shuffle: False
      num_workers: 8
      split: train
      adj_normalization: none

    val_dataloader: &val_dataloader_params
      data_processor: GNNDataProcessor
      dataset_name: PubMed
      data_dir: "$MODELZOO_ROOT/../../../data/gnn/datasets"
      sampling_mode: full_graph
      batch_size: 1
      drop_last_batch: True
      shuffle: False
      num_workers: 8
      split: val
      adj_normalization: none

  validate:
    val_dataloader: *val_dataloader_params

  validate_all:
    val_dataloaders:
      - *val_dataloader_params

runconfig:
  python_paths:
    - "$MODELZOO_ROOT/../.."
